<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        <div>Speed: <span id="speed">0</span> km/h</div>
        <div>Score: <span id="score">0</span></div>
    </div>
    <div id="controls">
        <div>W / ↑ - Accelerate</div>
        <div>S / ↓ - Brake/Reverse</div>
        <div>A / ← - Steer Left</div>
        <div>D / → - Steer Right</div>
        <div>Space - Handbrake</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, car;
        let ground, obstacles = [];
        let speed = 0;
        let steering = 0;
        let score = 0;
        const maxSpeed = 120;
        const acceleration = 0.3;
        const braking = 0.5;
        const friction = 0.98;
        const turnSpeed = 0.04;
        const keys = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 50, 200);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            createLights();
            createGround();
            createCar();
            createObstacles();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            animate();
        }

        function createLights() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 500;
            directionalLight.shadow.camera.left = -100;
            directionalLight.shadow.camera.right = 100;
            directionalLight.shadow.camera.top = 100;
            directionalLight.shadow.camera.bottom = -100;
            scene.add(directionalLight);
        }

        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(500, 500);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x3a7d3a,
                roughness: 0.8
            });
            ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const gridHelper = new THREE.GridHelper(500, 50, 0x2d5a2d, 0x2d5a2d);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);
        }

        function createCar() {
            car = new THREE.Group();

            const carBodyGeometry = new THREE.BoxGeometry(2, 1, 4);
            const carBodyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff0000,
                metalness: 0.6,
                roughness: 0.4
            });
            const carBody = new THREE.Mesh(carBodyGeometry, carBodyMaterial);
            carBody.position.y = 1;
            carBody.castShadow = true;
            car.add(carBody);

            const carTopGeometry = new THREE.BoxGeometry(1.8, 0.8, 2);
            const carTopMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xcc0000,
                metalness: 0.6,
                roughness: 0.4
            });
            const carTop = new THREE.Mesh(carTopGeometry, carTopMaterial);
            carTop.position.y = 1.9;
            carTop.position.z = -0.3;
            carTop.castShadow = true;
            car.add(carTop);

            const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32);
            const wheelMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x333333,
                roughness: 0.9
            });

            const wheelPositions = [
                { x: -1.1, y: 0.5, z: 1.2 },
                { x: 1.1, y: 0.5, z: 1.2 },
                { x: -1.1, y: 0.5, z: -1.2 },
                { x: 1.1, y: 0.5, z: -1.2 }
            ];

            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos.x, pos.y, pos.z);
                wheel.castShadow = true;
                car.add(wheel);
            });

            const headlightGeometry = new THREE.BoxGeometry(0.4, 0.3, 0.1);
            const headlightMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffffaa,
                emissive: 0xffffaa,
                emissiveIntensity: 0.5
            });

            const leftHeadlight = new THREE.Mesh(headlightGeometry, headlightMaterial);
            leftHeadlight.position.set(-0.6, 1, 2);
            car.add(leftHeadlight);

            const rightHeadlight = new THREE.Mesh(headlightGeometry, headlightMaterial);
            rightHeadlight.position.set(0.6, 1, 2);
            car.add(rightHeadlight);

            const taillightGeometry = new THREE.BoxGeometry(0.4, 0.3, 0.1);
            const taillightMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff0000,
                emissive: 0xff0000,
                emissiveIntensity: 0.5
            });

            const leftTaillight = new THREE.Mesh(taillightGeometry, taillightMaterial);
            leftTaillight.position.set(-0.6, 1, -2);
            car.add(leftTaillight);

            const rightTaillight = new THREE.Mesh(taillightGeometry, taillightMaterial);
            rightTaillight.position.set(0.6, 1, -2);
            car.add(rightTaillight);

            scene.add(car);
        }

        function createObstacles() {
            const obstacleColors = [0x0066cc, 0xff6600, 0x9933cc, 0x00cc66];
            
            for (let i = 0; i < 20; i++) {
                const size = Math.random() * 2 + 1;
                const geometry = new THREE.BoxGeometry(size, size * 2, size);
                const material = new THREE.MeshStandardMaterial({ 
                    color: obstacleColors[Math.floor(Math.random() * obstacleColors.length)],
                    roughness: 0.7
                });
                const obstacle = new THREE.Mesh(geometry, material);
                
                const x = (Math.random() - 0.5) * 200;
                const z = (Math.random() - 0.5) * 200;
                
                if (Math.abs(x) > 10 || Math.abs(z) > 10) {
                    obstacle.position.set(x, size, z);
                    obstacle.castShadow = true;
                    obstacle.receiveShadow = true;
                    scene.add(obstacle);
                    obstacles.push(obstacle);
                }
            }
        }

        function updatePhysics() {
            if (keys['KeyW'] || keys['ArrowUp']) {
                speed += acceleration;
            } else if (keys['KeyS'] || keys['ArrowDown']) {
                speed -= braking;
            } else {
                speed *= friction;
            }

            if (keys['Space']) {
                speed *= 0.95;
            }

            speed = Math.max(-maxSpeed / 3, Math.min(maxSpeed, speed));

            if (Math.abs(speed) > 0.1) {
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    steering += turnSpeed * (speed > 0 ? 1 : -1);
                }
                if (keys['KeyD'] || keys['ArrowRight']) {
                    steering -= turnSpeed * (speed > 0 ? 1 : -1);
                }
            }

            steering *= 0.9;
            car.rotation.y = steering;

            car.position.x += Math.sin(steering) * speed * 0.05;
            car.position.z += Math.cos(steering) * speed * 0.05;

            car.position.x = Math.max(-245, Math.min(245, car.position.x));
            car.position.z = Math.max(-245, Math.min(245, car.position.z));

            const carBox = new THREE.Box3().setFromObject(car);
            obstacles.forEach(obstacle => {
                const obstacleBox = new THREE.Box3().setFromObject(obstacle);
                if (carBox.intersectsBox(obstacleBox)) {
                    speed *= -0.5;
                    score = Math.max(0, score - 10);
                }
            });

            if (Math.abs(speed) > 1) {
                score += Math.floor(Math.abs(speed) * 0.01);
            }
        }

        function updateCamera() {
            const relativeOffset = new THREE.Vector3(0, 5, -10);
            const cameraOffset = relativeOffset.applyMatrix4(car.matrixWorld);
            
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(car.position);
        }

        function updateUI() {
            document.getElementById('speed').textContent = Math.floor(Math.abs(speed) * 2);
            document.getElementById('score').textContent = score;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            updatePhysics();
            updateCamera();
            updateUI();

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
